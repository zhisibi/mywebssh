<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>WebSocket 测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .log { background: #000; color: #0f0; padding: 10px; height: 300px; overflow-y: auto; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>WebSocket 连接测试</h2>
  <button onclick="testConnection()">测试连接</button>
  <button onclick="testMessage()">测试消息</button>
  <div class="log" id="log"></div>

  <script>
    let ws = null;
    const log = document.getElementById('log');
    
    function addLog(message, className = '') {
      const div = document.createElement('div');
      div.className = className;
      div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function testConnection() {
      addLog('正在建立 WebSocket 连接...');
      ws = new WebSocket(`ws://${location.host}`);

      ws.onopen = () => {
        addLog('✅ WebSocket 连接成功', 'success');
      };

      ws.onmessage = (event) => {
        addLog('📨 收到消息: ' + event.data);
      };

      ws.onclose = () => {
        addLog('🔌 WebSocket 连接关闭');
      };

      ws.onerror = (error) => {
        addLog('❌ WebSocket 错误: ' + error.message, 'error');
      };
    }

    function testMessage() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        addLog('❌ 请先建立连接', 'error');
        return;
      }

      const testMessage = {
        type: 'connect',
        serverId: 1
      };

      addLog('发送消息: ' + JSON.stringify(testMessage));
      ws.send(JSON.stringify(testMessage));
    }
  </script>
</body>
</html>
