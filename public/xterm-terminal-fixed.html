<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>WebSSH - xterm.js 终端 (修复版)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    .terminal-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    #terminal {
      width: 100%;
      height: 100%;
      padding: 10px;
    }
    
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(51, 51, 51, 0.9);
      color: #fff;
      padding: 8px 16px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(5px);
      z-index: 1000;
      border-bottom: 1px solid #666;
    }
    
    .server-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .connection-status {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .status-connecting { background: #ed8936; color: white; }
    .status-connected { background: #48bb78; color: white; }
    .status-disconnected { background: #f56565; color: white; }
    
    .connection-actions {
      display: flex;
      gap: 8px;
    }
    
    .action-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 16px;
      z-index: 2000;
    }
    
    .debug-console {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      color: #00ff00;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      max-height: 100px;
      overflow-y: auto;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div class="status-bar" id="statusBar">
    <div class="server-info">
      <span id="serverName">正在连接...</span>
      <span id="serverDetails"></span>
    </div>
    <div class="connection-actions">
      <span class="connection-status status-connecting" id="connectionStatus">连接中</span>
      <button class="action-btn" onclick="reconnect()" id="reconnectBtn" style="display: none;">重连</button>
      <button class="action-btn" onclick="showDebug()">调试</button>
      <button class="action-btn" onclick="closeTerminal()">关闭</button>
    </div>
  </div>
  
  <div class="terminal-container">
    <div id="terminal"></div>
  </div>
  
  <div class="loading-overlay" id="loadingOverlay">
    <div>正在连接 SSH 服务器...</div>
  </div>
  
  <div class="debug-console" id="debugConsole"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.8.0/lib/addon-fit.js"></script>
  <script>
    // 初始化 xterm.js
    const term = new Terminal({
      theme: {
        background: '#000000',
        foreground: '#00ff00',
        cursor: '#00ff00',
        cursorAccent: '#000000',
        selection: '#ffffff40',
        black: '#000000',
        red: '#ff5555',
        green: '#55ff55',
        yellow: '#ffff55',
        blue: '#5555ff',
        magenta: '#ff55ff',
        cyan: '#55ffff',
        white: '#ffffff',
        brightBlack: '#555555',
        brightRed: '#ff5555',
        brightGreen: '#55ff55',
        brightYellow: '#ffff55',
        brightBlue: '#5555ff',
        brightMagenta: '#ff55ff',
        brightCyan: '#55ffff',
        brightWhite: '#ffffff'
      },
      fontSize: 14,
      fontFamily: 'Monaco, Menlo, "Ubuntu Mono", Consolas, source-code-pro, monospace',
      cursorBlink: true,
      allowTransparency: true,
      cols: 80,
      rows: 24
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    
    const statusBar = document.getElementById('statusBar');
    const serverName = document.getElementById('serverName');
    const serverDetails = document.getElementById('serverDetails');
    const connectionStatus = document.getElementById('connectionStatus');
    const reconnectBtn = document.getElementById('reconnectBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const debugConsole = document.getElementById('debugConsole');
    
    let ws = null;
    let currentServer = null;

    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const serverId = urlParams.get('server');
    
    if (!serverId) {
      term.write('错误：未指定服务器ID\r\n');
      hideLoading();
      return;
    }

    // 初始化终端
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    
    // 监听窗口大小变化
    window.addEventListener('resize', () => {
      fitAddon.fit();
    });

    // 获取服务器信息
    async function getServerInfo() {
      try {
        const response = await fetch('/api/servers');
        const servers = await response.json();
        const server = servers.find(s => s.id == serverId);
        
        if (server) {
          currentServer = server;
          serverName.textContent = server.name;
          serverDetails.textContent = `${server.username}@${server.host}:${server.port}`;
          connectWebSocket();
        } else {
          term.write('错误：服务器不存在\r\n');
          hideLoading();
        }
      } catch (error) {
        term.write('获取服务器信息失败\r\n');
        hideLoading();
      }
    }

    function connectWebSocket() {
      debugLog('正在建立 WebSocket 连接...');
      ws = new WebSocket(`ws://${location.host}`);

      ws.onopen = () => {
        debugLog('✅ WebSocket 连接成功');
        updateStatus('connected', '已连接');
        reconnectBtn.style.display = 'none';
        
        // 发送连接请求
        const connectMessage = {
          type: 'connect',
          serverId: parseInt(currentServer.id)
        };
        debugLog('发送连接请求: ' + JSON.stringify(connectMessage));
        ws.send(JSON.stringify(connectMessage));
        
        term.focus();
        hideLoading();
      }

      ws.onmessage = (event) => {
        debugLog('📨 收到消息: ' + event.data.substring(0, 100) + '...');
        
        try {
          const message = JSON.parse(event.data);
          debugLog('✅ JSON 解析成功, 类型: ' + message.type);
          
          switch (message.type) {
            case 'data':
              term.write(message.data);
              break;
            case 'connected':
              term.write('\r\n*** ' + message.message + ' ***\r\n');
              break;
            case 'error':
              term.write('\r\n*** 错误: ' + message.message + ' ***\r\n');
              updateStatus('disconnected', '连接错误');
              reconnectBtn.style.display = 'block';
              break;
            case 'close':
              term.write('\r\n*** ' + message.message + ' ***\r\n');
              updateStatus('disconnected', '已断开');
              reconnectBtn.style.display = 'block';
              break;
            default:
              debugLog('❌ 未知消息类型: ' + message.type);
          }
        } catch (e) {
          debugLog('❌ JSON 解析失败: ' + e.message);
          debugLog('原始数据: ' + event.data);
          // 如果不是JSON，直接显示
          term.write(event.data);
        }
      };

      ws.onclose = () => {
        debugLog('🔌 WebSocket 连接关闭');
        updateStatus('disconnected', '已断开');
        reconnectBtn.style.display = 'block';
        term.write('\r\n*** WebSocket连接已关闭 ***\r\n');
      };

      ws.onerror = (error) => {
        debugLog('❌ WebSocket 错误: ' + error.message);
        updateStatus('disconnected', '连接错误');
        reconnectBtn.style.display = 'block';
        term.write('\r\n*** WebSocket连接错误 ***\r\n');
        hideLoading();
      };
    }

    // 键盘输入处理
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        const inputMessage = {
          type: 'input',
          data: data
        };
        debugLog('发送输入: ' + JSON.stringify(inputMessage));
        ws.send(JSON.stringify(inputMessage));
      }
    });

    function updateStatus(status, text) {
      connectionStatus.className = `connection-status status-${status}`;
      connectionStatus.textContent = text;
    }

    function reconnect() {
      showLoading();
      if (ws) {
        ws.close();
      }
      connectWebSocket();
    }

    function closeTerminal() {
      if (ws) {
        ws.close();
      }
      window.close();
    }

    function showLoading() {
      loadingOverlay.style.display = 'flex';
    }

    function hideLoading() {
      loadingOverlay.style.display = 'none';
    }

    function showDebug() {
      debugConsole.style.display = debugConsole.style.display === 'none' ? 'block' : 'none';
    }

    function debugLog(message) {
      const timestamp = new Date().toLocaleTimeString();
      const logEntry = document.createElement('div');
      logEntry.textContent = `${timestamp} - ${message}`;
      debugConsole.appendChild(logEntry);
      debugConsole.scrollTop = debugConsole.scrollHeight;
    }

    // 初始化
    showLoading();
    getServerInfo();
  </script>
</body>
</html>
