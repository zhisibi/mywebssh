<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSSH 控制面板</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f5f7fb; color:#111827; }
    .header { background:#111827; color:#fff; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
    .main-content { padding:24px; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .servers-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .server-card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:16px; box-shadow:0 4px 18px rgba(0,0,0,.04); }
    .server-header { display:flex; gap:12px; align-items:flex-start; margin-bottom:16px; }
    .server-icon { font-size:28px; }
    .server-name { font-size:18px; font-weight:700; }
    .server-address { color:#6b7280; font-size:13px; }
    .server-actions { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .server-btn, .add-server-btn, .logout-btn, .modal-footer button { border:none; border-radius:10px; padding:10px 14px; cursor:pointer; }
    .server-btn.ssh { background:#111827; color:#fff; }
    .server-btn.ftp { background:#4f46e5; color:#fff; }
    .server-btn.edit { background:#f59e0b; color:#fff; }
    .server-btn.delete { background:#dc2626; color:#fff; }
    .add-server-btn { background:#10b981; color:#fff; }
    .logout-btn { background:#374151; color:#fff; }
    .server-status { display:flex; align-items:center; gap:8px; font-size:14px; }
    .status-indicator { width:10px; height:10px; border-radius:999px; display:inline-block; }
    .status-indicator.online { background:#10b981; }
    .status-indicator.offline { background:#ef4444; }
    .modal { position:fixed; inset:0; background:rgba(17,24,39,.45); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .modal-content { width:520px; max-width:95vw; background:#fff; border-radius:16px; overflow:hidden; }
    .modal-header, .modal-footer { padding:16px 18px; border-bottom:1px solid #e5e7eb; }
    .modal-footer { border-bottom:none; border-top:1px solid #e5e7eb; display:flex; justify-content:flex-end; gap:8px; }
    .modal-body { padding:18px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:14px; margin-bottom:6px; color:#374151; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; font:inherit; }
    .close { cursor:pointer; font-size:24px; }
  </style>
</head>
<body>
  <div class="header">
    <h1 style="margin:0;font-size:22px;">WebSSH 控制面板</h1>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>

  <div class="main-content">
    <div class="section-header">
      <h2 style="margin:0;">服务器列表</h2>
      <button class="add-server-btn" onclick="showAddServer()">添加服务器</button>
    </div>
    <div class="servers-grid" id="serversGrid"></div>
  </div>

  <script>
    let authToken = localStorage.getItem('webssh_token') || null;
    if (!authToken) window.location.href = '/login.html';

    async function authFetch(url, options = {}) {
      const headers = { ...(options.headers || {}), Authorization: `Bearer ${authToken}` };
      const res = await fetch(url, { ...options, headers });
      if (res.status === 401) {
        localStorage.removeItem('webssh_token');
        window.location.href = '/login.html';
        throw new Error('登录失效');
      }
      return res;
    }

    async function loadServers() {
      try {
        const response = await authFetch('/api/servers');
        const servers = await response.json();
        const grid = document.getElementById('serversGrid');
        grid.innerHTML = '';

        servers.forEach(server => {
          const card = document.createElement('div');
          card.className = 'server-card';
          card.innerHTML = `
            <div class="server-header">
              <span class="server-icon">🖥️</span>
              <div>
                <div class="server-name">${escapeHtml(server.name)}</div>
                <div class="server-address">${escapeHtml(server.username)}@${escapeHtml(server.host)}:${server.port || 22}</div>
              </div>
            </div>
            <div class="server-actions">
              <button class="server-btn ssh" onclick="connectSSH(${server.id})">SSH</button>
              <button class="server-btn ftp" onclick="openFTP(${server.id})">SFTP</button>
              <button class="server-btn edit" onclick="editServer(${server.id})">编辑</button>
              <button class="server-btn delete" onclick="deleteServer(${server.id})">删除</button>
            </div>
            <div class="server-status">
              <span class="status-indicator ${server.enabled ? 'online' : 'offline'}"></span>
              <span>${server.enabled ? '已启用' : '已禁用'}</span>
            </div>`;
          grid.appendChild(card);
        });
      } catch (error) {
        console.error('加载服务器列表失败:', error);
        alert('加载服务器列表失败');
      }
    }

    function escapeHtml(str='') { return str.replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function connectSSH(serverId) { window.open(`/xterm-terminal.html?server=${serverId}`, '_blank'); }
    function openFTP(serverId) { window.open(`/sftp-browser.html?server=${serverId}`, '_blank'); }

    function showAddServer() {
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center;"><h3 style="margin:0;">添加服务器</h3><span class="close" onclick="closeModal()">&times;</span></div>
          <form id="serverForm" class="modal-body">
            <div class="form-group"><label>服务器名称</label><input name="name" required></div>
            <div class="form-group"><label>主机地址</label><input name="host" required></div>
            <div class="form-group"><label>端口</label><input name="port" type="number" value="22" required></div>
            <div class="form-group"><label>用户名</label><input name="username" required></div>
            <div class="form-group"><label>认证方式</label><select name="authType" onchange="toggleAuthField()"><option value="password">密码认证</option><option value="key">密钥认证</option></select></div>
            <div class="form-group" id="passwordField"><label>密码</label><input name="password" type="password"></div>
            <div class="form-group" id="keyField" style="display:none;"><label>私钥</label><textarea name="privateKey" rows="5"></textarea></div>
            <div class="form-group"><label>标签（逗号分隔）</label><input name="tags"></div>
          </form>
          <div class="modal-footer"><button type="button" onclick="closeModal()">取消</button><button type="submit" form="serverForm" style="background:#10b981;color:#fff;">保存</button></div>
        </div>`;
      document.body.appendChild(modal);
      document.getElementById('serverForm').addEventListener('submit', handleAddServer);
    }

    async function editServer(serverId) {
      const res = await authFetch('/api/servers');
      const servers = await res.json();
      const server = servers.find(s => s.id == serverId);
      if (!server) return alert('服务器不存在');

      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center;"><h3 style="margin:0;">编辑服务器</h3><span class="close" onclick="closeModal()">&times;</span></div>
          <form id="editServerForm" class="modal-body">
            <input type="hidden" name="id" value="${server.id}">
            <div class="form-group"><label>服务器名称</label><input name="name" value="${escapeHtml(server.name)}" required></div>
            <div class="form-group"><label>主机地址</label><input name="host" value="${escapeHtml(server.host)}" required></div>
            <div class="form-group"><label>端口</label><input name="port" type="number" value="${server.port || 22}" required></div>
            <div class="form-group"><label>用户名</label><input name="username" value="${escapeHtml(server.username)}" required></div>
            <div class="form-group"><label>认证方式</label><select name="authType" onchange="toggleAuthField()"><option value="password" ${server.authType==='password'?'selected':''}>密码认证</option><option value="key" ${server.authType==='key'?'selected':''}>密钥认证</option></select></div>
            <div class="form-group" id="passwordField" style="display:${server.authType==='password'?'block':'none'};"><label>密码</label><input name="password" type="password" value="${escapeHtml(server.password || '')}"></div>
            <div class="form-group" id="keyField" style="display:${server.authType==='key'?'block':'none'};"><label>私钥</label><textarea name="privateKey" rows="5">${escapeHtml(server.privateKey || '')}</textarea></div>
            <div class="form-group"><label>标签</label><input name="tags" value="${escapeHtml((server.tags || []).join(', '))}"></div>
            <div class="form-group"><label>启用状态</label><select name="enabled"><option value="true" ${server.enabled?'selected':''}>启用</option><option value="false" ${!server.enabled?'selected':''}>禁用</option></select></div>
          </form>
          <div class="modal-footer"><button type="button" onclick="closeModal()">取消</button><button type="submit" form="editServerForm" style="background:#f59e0b;color:#fff;">保存</button></div>
        </div>`;
      document.body.appendChild(modal);
      document.getElementById('editServerForm').addEventListener('submit', handleEditServer);
    }

    function toggleAuthField() {
      const authType = document.querySelector('.modal select[name="authType"]').value;
      document.getElementById('passwordField').style.display = authType === 'password' ? 'block' : 'none';
      document.getElementById('keyField').style.display = authType === 'key' ? 'block' : 'none';
    }

    async function handleAddServer(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const serverData = {
        name: formData.get('name'),
        host: formData.get('host'),
        port: parseInt(formData.get('port')),
        username: formData.get('username'),
        authType: formData.get('authType'),
        tags: (formData.get('tags') || '').split(',').map(v => v.trim()).filter(Boolean)
      };
      if (serverData.authType === 'password') serverData.password = formData.get('password') || '';
      else serverData.privateKey = formData.get('privateKey') || '';

      const response = await authFetch('/api/servers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(serverData)
      });
      const data = await response.json();
      if (!response.ok || !data.success) return alert(data.message || '添加服务器失败');
      closeModal();
      await loadServers();
      alert('服务器添加成功');
    }

    async function handleEditServer(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const id = formData.get('id');
      const serverData = {
        name: formData.get('name'),
        host: formData.get('host'),
        port: parseInt(formData.get('port')),
        username: formData.get('username'),
        authType: formData.get('authType'),
        enabled: formData.get('enabled') === 'true',
        tags: (formData.get('tags') || '').split(',').map(v => v.trim()).filter(Boolean)
      };
      if (serverData.authType === 'password') serverData.password = formData.get('password') || '';
      else serverData.privateKey = formData.get('privateKey') || '';

      const response = await authFetch(`/api/servers/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(serverData)
      });
      const data = await response.json();
      if (!response.ok || !data.success) return alert(data.message || '更新失败');
      closeModal();
      await loadServers();
      alert('服务器更新成功');
    }

    async function deleteServer(serverId) {
      if (!confirm('确定要删除这个服务器吗？')) return;
      const response = await authFetch(`/api/servers/${serverId}`, { method: 'DELETE' });
      const data = await response.json();
      if (!response.ok || !data.success) return alert(data.message || '删除失败');
      await loadServers();
      alert('服务器删除成功');
    }

    function closeModal() {
      const modal = document.querySelector('.modal');
      if (modal) modal.remove();
    }

    async function logout() {
      try { await authFetch('/api/logout', { method: 'POST' }); } catch (_) {}
      localStorage.removeItem('webssh_token');
      window.location.href = '/login.html';
    }

    loadServers();
  </script>
</body>
</html>
