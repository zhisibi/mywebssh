<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>WebSSH - SFTP 文件浏览器</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f5f7fb; color:#1f2937; }
    .layout { display:flex; flex-direction:column; height:0; }
    .sidebar { width:280px; border-right:1px solid #e5e7eb; background:#fff; padding:16px; overflow:auto; transition:all .25s ease; }
    .sidebar.hidden-sidebar { width:0; padding:0; overflow:hidden; border-right:none; }
    .main { flex:1; display:flex; flex-direction:column; min-width:0; }
    .topbar { 
      padding:14px 18px; background:#111827; border-bottom:1px solid #e5e7eb; flex-shrink:0; 
      position: sticky; top: 0; z-index: 100; width: 100%;
    }
    .server-info { display:flex; gap:16px; align-items:center; margin-bottom:12px; }
    .server-name { font-weight:700; font-size:16px; color:#fff; }
    .server-details { color:#9ca3af; font-size:13px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; }
    .content { padding:16px; overflow:auto; flex:1; position: relative; }
     .table-wrap { overflow:visible; }
    table { position: relative; }
    table thead { 
      position: sticky; top: 0; 
      background:#f9fafb; z-index: 10;
    }
    table th, table td { font-size: 15px; }
    table th { position: sticky; top: 0; background:#f9fafb; z-index: 20; }
    table thead th { position: sticky; top: 0; background:#f9fafb; z-index: 20; }
    @media (max-width: 768px) {
      .topbar { padding:12px; }
      .server-info { flex-direction:column; align-items:flex-start; gap:4px; margin-bottom:12px; }
      .toolbar { width:100%; }
      .btn { flex:1 1 calc(50% - 8px); text-align:center; }
      .content { padding:8px; }
      th, td { padding:10px 8px; font-size:12px; }
      .actions { flex-wrap:wrap; }
      .server-name { font-size:15px; }
    }
    .server-item { border:1px solid #e5e7eb; border-radius:10px; padding:12px; margin-bottom:10px; cursor:pointer; }
    .server-item:hover, .server-item.active { border-color:#4f46e5; background:#eef2ff; }
    .server-name { margin-bottom:4px; }
    .server-meta { color:#6b7280; font-size:12px; }
    .breadcrumb { display:flex; gap:6px; flex-wrap:wrap; align-items:center; min-width:0; }
    .crumb { color:#4f46e5; cursor:pointer; }
    .crumb:hover { text-decoration:underline; }
    .btn { border:none; border-radius:10px; padding:10px 14px; cursor:pointer; }
    .btn.secondary { background:#374151; color:#fff; }
    .btn.secondary:hover { background:#4b5563; }
    .btn:hover { background:#f9fafb; }
    .btn.primary { background:#4f46e5; color:#fff; border-color:#4f46e5; }
    .btn.danger { color:#b91c1c; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; }
    th, td { text-align:left; padding:12px 14px; border-bottom:1px solid #eef2f7; }
    th { background:#f9fafb; font-size:13px; color:#6b7280; }
    tr:hover td { background:#fafbff; }
    .name-cell { display:flex; align-items:center; gap:8px; }
    .actions { display:flex; gap:8px; }
    .muted { color:#6b7280; }
    .login-mask, .modal-mask { position:fixed; inset:0; background:rgba(15,23,42,.45); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .card { width:360px; max-width:92vw; background:#fff; border-radius:14px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,.15); }
    .card h3 { margin:0 0 16px; }
    .input, textarea { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; margin-bottom:10px; font:inherit; }
    textarea { min-height:320px; resize:vertical; }
    .hidden { display:none !important; }
    .status { padding:10px 12px; background:#fff; border-top:1px solid #e5e7eb; color:#6b7280; font-size:14px; position: sticky; bottom: 0; }
    .empty { background:#fff; border-radius:12px; padding:20px; text-align:center; color:#6b7280; }
    .file-link { cursor:pointer; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar hidden-sidebar" id="sidebar">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <h3 style="margin:0;">服务器</h3>
        <button class="btn" onclick="toggleSidebar()">收起</button>
      </div>
      <div id="serverList"></div>
    </aside>
    <main class="main">
      <div class="topbar" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
          <span id="serverName" style="font-weight:700;font-size:18px;color:#fff;cursor:pointer;" onclick="toggleSort()" title="点击排序"></span>
          <span id="serverDetails" style="color:#9ca3af;font-size:14px;"></span>
          <span id="breadcrumb" style="color:#9ca3af;font-size:12px;margin-left:8px;"></span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn secondary" onclick="goParent()">上一级</button>
          <button class="btn secondary" onclick="refreshList()">刷新</button>
          <button class="btn secondary" onclick="createFolder()">新建</button>
          <button class="btn secondary" onclick="uploadFile()">上传</button>
          <button class="btn secondary" onclick="downloadSelected()">打包下载</button>
          <button class="btn secondary" onclick="window.close()">关闭</button>
        </div>
      </div>
      <div class="content">
        <div id="fileList" class="empty">请选择一个服务器</div>
      </div>
      <div class="status" id="statusBar">就绪</div>
    </main>
  </div>

  <input id="fileInput" type="file" class="hidden" />

  <div id="loginModal" class="login-mask hidden">
    <div class="card">
      <h3>登录 WebSSH</h3>
      <input id="loginUsername" class="input" placeholder="用户名" value="admin" />
      <input id="loginPassword" class="input" type="password" placeholder="密码" value="admin123" />
      <button class="btn primary" style="width:100%;" onclick="doLogin()">登录</button>
    </div>
  </div>

  <div id="previewModal" class="modal-mask hidden">
    <div class="card" style="width:900px;max-width:95vw;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <h3 id="previewTitle" style="margin:0;">文件预览</h3>
        <button class="btn" onclick="closePreview()">关闭</button>
      </div>
      <textarea id="previewContent" readonly></textarea>
    </div>
  </div>

  <script>
    let authToken = localStorage.getItem('webssh_token') || null;
    let currentServer = null;
    let currentPath = '/';
    let currentFiles = [];
    let selectedPaths = new Set();
    let sortField = 'name';
    let sortAsc = true;

    const urlParams = new URLSearchParams(location.search);
    const urlServerId = urlParams.get('server');

    function setStatus(text) { document.getElementById('statusBar').textContent = text; }
    function escapeHtml(str='') { return str.replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function joinPath(base, name) { return base === '/' ? `/${name}` : `${base}/${name}`; }
    function formatSize(bytes) {
      if (bytes == null) return '-';
      if (bytes < 1024) return bytes + ' B';
      const units = ['KB','MB','GB','TB'];
      let i = -1, n = bytes;
      do { n /= 1024; i++; } while (n >= 1024 && i < units.length - 1);
      return n.toFixed(n >= 10 ? 0 : 1) + ' ' + units[i];
    }
    function formatTime(ts) {
      if (!ts) return '-';
      return new Date(ts * 1000).toLocaleString('zh-CN');
    }
    function icon(type) { return type === 'directory' ? '📁' : type === 'link' ? '🔗' : '📄'; }

    function requireLogin() {
      const modal = document.getElementById('loginModal');
      if (!authToken) modal.classList.remove('hidden');
      else modal.classList.add('hidden');
    }

    async function authFetch(url, options = {}) {
      if (!authToken) throw new Error('未登录');
      const headers = { ...(options.headers || {}), Authorization: `Bearer ${authToken}` };
      const res = await fetch(url, { ...options, headers });
      if (res.status === 401) {
        logout(false);
        throw new Error('登录已失效，请重新登录');
      }
      return res;
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!data.success) return alert(data.message || '登录失败');
      authToken = data.token;
      localStorage.setItem('webssh_token', authToken);
      document.getElementById('loginModal').classList.add('hidden');
      setStatus('登录成功');
      function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden-sidebar'); }

    init();
    }

    async function logout(reload = true) {
      try {
        if (authToken) {
          await fetch('/api/logout', { method: 'POST', headers: { Authorization: `Bearer ${authToken}` } });
        }
      } catch (_) {}
      authToken = null;
      localStorage.removeItem('webssh_token');
      if (reload) location.href = '/dashboard.html';
      else location.reload();
    }

    async function init() {
      if (!authToken) {
        requireLogin();
        return;
      }

      if (urlServerId) {
        await loadServerById(urlServerId);
      } else {
        document.getElementById('serverName').textContent = '未选择服务器';
        document.getElementById('serverDetails').textContent = '请从控制面板进入';
        document.getElementById('fileList').innerHTML = `
          <div class="empty">
            <h3>未指定服务器</h3>
            <p>请从控制面板选择服务器进入 SFTP 文件管理</p>
            <button class="btn primary" onclick="location.href='/dashboard.html'" style="margin-top:12px;">前往控制面板</button>
          </div>`;
      }
    }

    async function loadServerById(serverIdStr) {
      try {
        setStatus(`正在加载服务器信息 (ID: ${serverIdStr})...`);
        const res = await authFetch('/api/servers');
        const servers = await res.json();
        currentServer = servers.find(s => String(s.id) === String(serverIdStr));
        
        if (!currentServer) {
          setStatus('服务器不存在');
          document.getElementById('serverName').textContent = '服务器不存在';
          document.getElementById('serverDetails').textContent = '';
          document.getElementById('fileList').innerHTML = `<div class="empty"><h3>服务器不存在</h3><p>服务器 ID: ${escapeHtml(serverIdStr)}</p><button class="btn primary" onclick="location.href='/dashboard.html'" style="margin-top:12px;">返回控制面板</button></div>`;
          return;
        }

        document.getElementById('serverName').textContent = currentServer.name;
        document.getElementById('serverDetails').textContent = `${escapeHtml(currentServer.username)}@${escapeHtml(currentServer.host)}:${currentServer.port || 22}`;
        currentPath = '/';
        selectedPaths.clear();
        
        updateBreadcrumb();
        await refreshList();
      } catch (error) {
        setStatus('加载失败');
        document.getElementById('fileList').innerHTML = `<div class="empty"><h3>加载失败</h3><p>${escapeHtml(error.message)}</p><button class="btn primary" onclick="location.href='/dashboard.html'" style="margin-top:12px;">返回控制面板</button></div>`;
      }
    }

    async function loadServers() {
      requireLogin();
      if (!authToken) return;
      setStatus('正在加载服务器列表...');
      const res = await authFetch('/api/servers');
      const servers = await res.json();
      const box = document.getElementById('serverList');
      box.innerHTML = '';
      servers.forEach(server => {
        const div = document.createElement('div');
        div.className = 'server-item' + (currentServer && currentServer.id == server.id ? ' active' : '');
        div.innerHTML = `<div class="server-name">${escapeHtml(server.name)}</div><div class="server-meta">${escapeHtml(server.username)}@${escapeHtml(server.host)}:${server.port || 22}</div>`;
        div.onclick = () => selectServer(server);
        box.appendChild(div);
      });
      setStatus('服务器列表已加载');
    }

    async function selectServer(server) {
      currentServer = server;
      currentPath = '/';
      selectedPaths.clear();
      await loadServers();
      updateBreadcrumb();
      await refreshList();
    }

    function updateBreadcrumb() {
      const box = document.getElementById('breadcrumb');
      const parts = currentPath.split('/').filter(Boolean);
      let acc = '';
      let html = `<span class="crumb" onclick="navigateTo('/')">根目录</span>`;
      for (const part of parts) {
        acc += '/' + part;
        html += `<span>/</span><span class="crumb" onclick="navigateTo('${acc.replace(/'/g, "\\'")}')">${escapeHtml(part)}</span>`;
      }
      box.innerHTML = html;
    }

    async function navigateTo(path) {
      currentPath = path || '/';
      selectedPaths.clear();
      updateBreadcrumb();
      await refreshList();
    }

    async function goParent() {
      if (currentPath === '/') return;
      const parts = currentPath.split('/').filter(Boolean);
      parts.pop();
      await navigateTo('/' + parts.join('/'));
    }

    async function refreshList() {
      if (!currentServer) return;
      setStatus(`正在读取 ${currentPath} ...`);
      const res = await authFetch(`/api/sftp/list?serverId=${currentServer.id}&path=${encodeURIComponent(currentPath)}`);
      const data = await res.json();
      if (!data.success) return renderEmpty(data.message || '读取失败');
      currentFiles = data.files || [];
      renderFiles();
      setStatus(`已加载 ${currentPath}`);
    }

    function renderEmpty(text) {
      document.getElementById('fileList').innerHTML = `<div class="empty">${escapeHtml(text)}</div>`;
    }

    function toggleSelect(fullPath, checked) {
      if (checked) selectedPaths.add(fullPath); else selectedPaths.delete(fullPath);
    }

    function toggleSort(field) {
      if (sortField === field) {
        sortAsc = !sortAsc;
      } else {
        sortField = field;
        sortAsc = true;
      }
      renderFiles();
      const fieldNames = { name: '名称', type: '类型', size: '大小', mtime: '修改时间' };
      setStatus(`排序: ${fieldNames[field] || field} ${sortAsc ? '↑' : '↓'}`);
    }

    function getSortIcon(field) {
      if (sortField !== field) return '';
      return sortAsc ? ' ↑' : ' ↓';
    }

    function renderFiles() {
      const box = document.getElementById('fileList');
      if (!currentFiles.length) return renderEmpty('当前目录为空');
      
      // 排序：目录在前，文件按选择字段排序
      const sorted = [...currentFiles].sort((a, b) => {
        const aIsDir = a.type === 'directory';
        const bIsDir = b.type === 'directory';
        if (aIsDir !== bIsDir) return aIsDir ? -1 : 1;
        
        let cmp = 0;
        if (sortField === 'name') cmp = a.name.localeCompare(b.name);
        else if (sortField === 'type') cmp = (a.type || '').localeCompare(b.type || '');
        else if (sortField === 'size') cmp = (a.size || 0) - (b.size || 0);
        else if (sortField === 'mtime') cmp = (a.mtime || 0) - (b.mtime || 0);
        return sortAsc ? cmp : -cmp;
      });
      
      box.innerHTML = `<div class="table-wrap"><table>
        <thead>
          <tr>
            <th style="width:36px;"></th>
            <th onclick="toggleSort('name')" style="cursor:pointer;">名称${getSortIcon('name')}</th>
            <th onclick="toggleSort('type')" style="cursor:pointer;">类型${getSortIcon('type')}</th>
            <th onclick="toggleSort('size')" style="cursor:pointer;">大小${getSortIcon('size')}</th>
            <th onclick="toggleSort('mtime')" style="cursor:pointer;">修改时间${getSortIcon('mtime')}</th>
            <th>权限</th>
            <th style="width:280px;">操作</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(file => {
            const fullPath = joinPath(currentPath, file.name);
            const isDir = file.type === 'directory';
            const typeName = file.type === 'directory' ? '目录' : file.type === 'link' ? '链接' : '文件';
            return `<tr>
              <td><input type="checkbox" onchange="toggleSelect('${fullPath.replace(/'/g, "\\'")}', this.checked)" /></td>
              <td><div class="name-cell"><span>${icon(file.type)}</span><span class="file-link" onclick="openEntry('${fullPath.replace(/'/g, "\\'")}', '${file.type}')">${escapeHtml(file.name)}</span></div></td>
              <td>${typeName}</td>
              <td>${isDir ? '-' : formatSize(file.size)}</td>
              <td>${formatTime(file.mtime)}</td>
              <td><code>${escapeHtml(file.mode || '')}</code></td>
              <td>
                <div class="actions">
                  ${isDir ? `<button class="btn" onclick="navigateTo('${fullPath.replace(/'/g, "\\'")}')">进入</button>` : `<button class="btn" onclick="previewFile('${fullPath.replace(/'/g, "\\'")}', '${file.name.replace(/'/g, "\\'")}')">预览</button>`}
                  <button class="btn" onclick="downloadOne('${fullPath.replace(/'/g, "\\'")}')">下载</button>
                  <button class="btn" onclick="renameEntry('${fullPath.replace(/'/g, "\\'")}', '${file.name.replace(/'/g, "\\'")}')">重命名</button>
                  <button class="btn danger" onclick="deleteEntry('${fullPath.replace(/'/g, "\\'")}', '${file.type}', '${file.name.replace(/'/g, "\\'")}')">删除</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`;
    }

    function openEntry(fullPath, type) {
      if (type === 'directory') navigateTo(fullPath);
      else previewFile(fullPath, fullPath.split('/').pop());
    }

    async function createFolder() {
      if (!currentServer) return alert('先选服务器');
      const dirname = prompt('输入文件夹名');
      if (!dirname) return;
      const res = await authFetch('/api/sftp/mkdir', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ serverId: currentServer.id, path: currentPath, dirname })
      });
      const data = await res.json();
      if (!data.success) return alert(data.message || '创建失败');
      await refreshList();
    }

    function uploadFile() {
      if (!currentServer) return alert('先选服务器');
      const input = document.getElementById('fileInput');
      input.value = '';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setStatus(`正在上传 ${file.name} ...`);
        const reader = new FileReader();
        reader.onload = async ev => {
          const content = String(ev.target.result).split(',')[1];
          const res = await authFetch('/api/sftp/upload', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ serverId: currentServer.id, path: currentPath, filename: file.name, content })
          });
          const data = await res.json();
          if (!data.success) return alert(data.message || '上传失败');
          setStatus(`上传完成：${file.name}`);
          await refreshList();
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    function downloadOne(fullPath) {
      const url = `/api/sftp/download?serverId=${currentServer.id}&path=${encodeURIComponent(fullPath)}`;
      fetchWithAuthDownload(url);
    }

    function downloadSelected() {
      if (!currentServer) return alert('先选服务器');
      if (!selectedPaths.size) return alert('先勾选文件或目录');
      fetchWithAuthDownload('/api/sftp/download-batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ serverId: currentServer.id, paths: Array.from(selectedPaths) })
      }, 'download.zip');
    }

    async function fetchWithAuthDownload(url, options = null, fallbackName = null) {
      const opts = options || { method: 'GET' };
      opts.headers = { ...(opts.headers || {}), Authorization: `Bearer ${authToken}` };
      const res = await fetch(url, opts);
      if (!res.ok) {
        const text = await res.text();
        return alert(`下载失败: ${text}`);
      }
      const blob = await res.blob();
      const a = document.createElement('a');
      const obj = URL.createObjectURL(blob);
      a.href = obj;
      const disposition = res.headers.get('Content-Disposition') || '';
      const m = disposition.match(/filename="?([^";]+)"?/i);
      a.download = m ? decodeURIComponent(m[1]) : (fallbackName || 'download');
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(obj);
    }

    async function renameEntry(oldPath, oldName) {
      const newName = prompt('输入新名称', oldName);
      if (!newName || newName === oldName) return;
      const base = oldPath.split('/').slice(0, -1).join('/') || '/';
      const newPath = joinPath(base, newName);
      const res = await authFetch('/api/sftp/rename', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ serverId: currentServer.id, oldPath, newPath })
      });
      const data = await res.json();
      if (!data.success) return alert(data.message || '重命名失败');
      await refreshList();
    }

    async function deleteEntry(targetPath, type, name) {
      if (!confirm(`确定删除 ${name} 吗？`)) return;
      const res = await authFetch('/api/sftp/delete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ serverId: currentServer.id, targetPath, type })
      });
      const data = await res.json();
      if (!data.success) return alert(data.message || '删除失败');
      selectedPaths.delete(targetPath);
      await refreshList();
    }

    async function previewFile(filePath, fileName) {
      const res = await authFetch(`/api/sftp/read?serverId=${currentServer.id}&path=${encodeURIComponent(filePath)}`);
      const data = await res.json();
      if (!data.success) return alert(data.message || '读取失败');
      document.getElementById('previewTitle').textContent = `文件预览 - ${fileName}`;
      document.getElementById('previewContent').value = data.content || '';
      document.getElementById('previewModal').classList.remove('hidden');
    }

    function closePreview() {
      document.getElementById('previewModal').classList.add('hidden');
    }

    init();
  </script>
</body>
</html>
