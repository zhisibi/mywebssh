<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSSH - 终端</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; height:100vh; height:100dvh; max-height:100vh; overflow:hidden; }
    .layout { display:flex; flex-direction:column; height:100vh; height:100dvh; max-height:100vh; }
    .status-bar {
      position:relative; z-index:20;
      background:rgba(17,24,39,.92); border-bottom:1px solid rgba(255,255,255,.12);
      padding:6px 12px; display:flex; justify-content:space-between; align-items:center;
    }
    .server-info { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .server-details { display:none; }
    .actions { gap:8px; align-items:center; }
    .chip { display:none; }
    .btn { border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.08); color:#fff; border-radius:8px; padding:6px 10px; cursor:pointer; font-size:13px; }
    .btn:hover { background:rgba(255,255,255,.14); }
    .terminal-container { flex:1; position:relative; overflow:hidden; }
    #terminal { width:100%; height:100%; padding:8px; }
    .overlay {
      position:fixed; inset:0; z-index:30; background:rgba(0,0,0,.7);
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px;
    }
    .mobile-keypad { display:none; }
    @media (max-width: 768px) {
      .mobile-keypad {
        display:block;
        background:rgba(17,24,39,.95);
        border-top:1px solid rgba(255,255,255,.12);
        padding:6px 8px;
        overflow-x:auto;
        white-space:nowrap;
        -webkit-overflow-scrolling:touch;
      }
      .mobile-keypad .row { display:flex; gap:6px; margin-bottom:6px; justify-content:center; }
      .mobile-keypad .key {
        min-width:40px; height:40px;
        display:flex; align-items:center; justify-content:center;
        background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18);
        border-radius:10px; color:#fff; font-size:13px; font-weight:500; cursor:pointer;
        user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
      }
      .mobile-keypad .key:active { background:rgba(255,255,255,.24); }
      .mobile-keypad .key.special { background:rgba(16,185,129,.2); border-color:rgba(16,185,129,.4); color:#34d399; }
      .mobile-keypad .key.ctrl { background:rgba(239,68,68,.2); border-color:rgba(239,68,68,.4); color:#f87171; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="status-bar">
      <div class="server-info">
        <div id="serverName">正在准备终端...</div>
        <div id="serverDetails"></div>
      </div>
      <div class="actions">
        <button class="btn" id="reconnectBtn" onclick="reconnect()" style="display:none;">重连</button>
        <button class="btn" onclick="closeTerminal()">关闭</button>
      </div>
    </div>

    <div class="terminal-container">
      <div id="terminal"></div>
    </div>

    <div class="mobile-keypad">
      <div class="row">
        <button class="key" onclick="sendEsc()">ESC</button>
        <button class="key" onclick="sendTab()">TAB</button>
        <button class="key ctrl" onclick="sendCtrl('C')">Ctrl+C</button>
        <button class="key" onclick="sendCtrl('V')">Ctrl+V</button>
        <button class="key" onclick="sendCtrl('Z')">Ctrl+Z</button>
        <button class="key" onclick="sendCtrl('L')">Ctrl+L</button>
      </div>
      <div class="row">
        <button class="key" onclick="sendArrow('UP')">↑</button>
        <button class="key" onclick="sendArrow('DOWN')">↓</button>
        <button class="key" onclick="sendArrow('LEFT')">←</button>
        <button class="key" onclick="sendArrow('RIGHT')">→</button>
        <button class="key" onclick="sendCtrl('L')">Ctrl+L</button>
        <button class="key" onclick="sendPageDown()">PgDn</button>
        <button class="key special" onclick="toggleKeyboard()">⌨️</button>
      </div>
    </div>

    <div id="loadingOverlay" class="overlay">正在连接 SSH 服务器...</div>

  <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const authToken = localStorage.getItem('webssh_token');
    const urlParams = new URLSearchParams(location.search);
    const serverId = urlParams.get('server');
    const serverNameEl = document.getElementById('serverName');
    const statusEl = document.getElementById('connectionStatus');
    const reconnectBtn = document.getElementById('reconnectBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    let ws = null;
    let currentServer = null;

    const term = new Terminal({
      theme: {
        background: '#000000', foreground: '#d1fae5', cursor: '#10b981', cursorAccent: '#000000', selection: '#ffffff30'
      },
      fontSize: 14,
      fontFamily: 'Menlo, Monaco, Consolas, monospace',
      cursorBend: true,
      convertEol: false,
      scrollback: 5000
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    window.addEventListener('resize', () => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });

    function showLoading(text = '正在连接 SSH 服务器...') { loadingOverlay.textContent = text; loadingOverlay.style.display = 'flex'; }
    function hideLoading() { loadingOverlay.style.display = 'none'; }
    function updateStatus(state, text) {
      if (statusEl && statusEl.parentNode) {
        statusEl.className = `chip ${state}`;
        statusEl.textContent = text;
        statusEl.style.display = 'inline-block';
      }
    }

    async function authFetch(url, options = {}) {
      if (!authToken) {
        alert('登录已失效，请重新登录');
        location.href = '/login.html';
        throw new Error('未登录');
      }
      const res = await fetch(url, { ...options, headers: { ...(options.headers || {}), Authorization: `Bearer ${authToken}` } });
      if (res.status === 401) {
        localStorage.removeItem('webssh_token');
        alert('登录已失效，请重新登录');
        location.href = '/login.html';
        throw new Error('未授权');
      }
      return res;
    }

    async function getServerInfo() {
      if (!serverId) {
        term.write('错误：未指定服务器ID\r\n');
        updateStatus('disconnected', '参数错误');
        hideLoading();
        return;
      }
      try {
        const response = await authFetch('/api/servers');
        const servers = await response.json();
        currentServer = servers.find(s => String(s.id) === String(serverId));
        if (!currentServer) {
          term.write('错误：服务器不存在\r\n');
          updateStatus('disconnected', '服务器不存在');
          hideLoading();
          return;
        }
        serverNameEl.textContent = currentServer.name;
        connectWebSocket();
      } catch (error) {
        term.write(`获取服务器信息失败: ${error.message}\r\n`);
        updateStatus('disconnected', '加载失败');
        hideLoading();
      }
    }

    function connectWebSocket() {
      updateStatus('connecting', '连接中');
      showLoading('正在建立 WebSocket 与 SSH 连接...');
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        console.log('WebSocket opened');
        reconnectBtn.style.display = 'none';
        const connectMsg = {
          type: 'connect',
          token: authToken,
          serverId: parseInt(currentServer.id, 10),
          cols: term.cols,
          rows: term.rows
        };
        console.log('Sending message:', connectMsg);
        ws.send(JSON.stringify(connectMsg));
        term.focus();
        term.write('\r\n*** WebSocket已连接，正在建立SSH连接...\r\n');
      };

      ws.onmessage = (event) => {
        console.log('WebSocket message:', event.data);
        let message;
        try { message = JSON.parse(event.data); } catch { term.write(event.data); return; }
        console.log('Parsed message:', message);
        switch (message.type) {
          case 'connected':
            updateStatus('connected', '已连接');
            hideLoading();
            term.write(`\r\n*** ${message.message} ***\r\n`);
            break;
          case 'data':
            term.write(message.data || '');
            break;
          case 'error':
            updateStatus('disconnected', '连接错误');
            reconnectBtn.style.display = 'inline-block';
            hideLoading();
            term.write(`\r\n*** 错误: ${message.message} ***\r\n`);
            break;
          case 'close':
            updateStatus('disconnected', '已断开');
            reconnectBtn.style.display = 'inline-block';
            hideLoading();
            term.write(`\r\n*** ${message.message} ***\r\n`);
            break;
        }
      };

      ws.onclose = (event) => {
        console.log('WebSocket closed:', event.code, event.reason);
        updateStatus('disconnected', '已断开');
        reconnectBtn.style.display = 'inline-block';
        hideLoading();
        term.write(`\r\n*** WebSocket连接已关闭 (code: ${event.code}, reason: ${event.reason}) ***\r\n`);
      };

      ws.onerror = (error) => {
        console.log('WebSocket error:', error);
        updateStatus('disconnected', '连接错误');
        reconnectBtn.style.display = 'inline-block';
        hideLoading();
        term.write('\r\n*** WebSocket连接错误 ***\r\n');
        term.write('\r\n*** 详细错误信息请查看浏览器控制台 (F12) ***\r\n');
      };
    }

    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    function reconnect() {
      if (ws) try { ws.close(); } catch (_) {}
      term.write('\r\n*** 正在重连... ***\r\n');
      connectWebSocket();
    }

    function closeTerminal() {
      if (ws) {
        try {
          ws.close();
        } catch (_) {}
      }
      window.close();
      if (window.opener) {
        window.location.href = '/dashboard.html';
      }
    }

    function sendEsc() { sendKey('\x1b'); }
    function sendTab() { sendKey('\t'); }
    function sendCtrl(key) {
      const ctrlKeys = { 'C': '\x03', 'V': '\x16', 'Z': '\x1a', 'L': '\x0c' };
      sendKey(ctrlKeys[key] || '');
    }
    function sendArrow(dir) {
      const arrows = { 'UP': '\x1b[A', 'DOWN': '\x1b[B', 'LEFT': '\x1b[D', 'RIGHT': '\x1b[C' };
      sendKey(arrows[dir] || '');
    }
    function sendKey(key) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data: key }));
      }
    }

    showLoading();
    getServerInfo();
  </script>
</body>
</html>
