<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSSH - 终端</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; height:100vh; overflow:hidden; }
    .status-bar {
      position:fixed; top:0; left:0; right:0; z-index:20;
      background:rgba(17,24,39,.92); border-bottom:1px solid rgba(255,255,255,.12);
      padding:10px 14px; display:flex; justify-content:space-between; align-items:center; gap:12px;
    }
    .server-info { min-width:0; }
    .server-name { font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .server-details { font-size:12px; color:#9ca3af; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .actions { display:flex; gap:8px; align-items:center; flex-shrink:0; }
    .chip { font-size:12px; padding:4px 8px; border-radius:999px; }
    .connecting { background:#92400e; color:#fde68a; }
    .connected { background:#065f46; color:#a7f3d0; }
    .disconnected { background:#7f1d1d; color:#fecaca; }
    .btn { border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.08); color:#fff; border-radius:8px; padding:7px 10px; cursor:pointer; }
    .btn:hover { background:rgba(255,255,255,.14); }
    #terminalWrap { position:absolute; inset:56px 0 0 0; padding:8px; }
    #terminal { width:100%; height:100%; }
    .overlay {
      position:fixed; inset:0; z-index:30; background:rgba(0,0,0,.7);
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px;
    }
    @media (max-width: 768px) {
      .status-bar { padding:8px 10px; flex-wrap:wrap; align-items:flex-start; }
      .server-info { width:100%; }
      .actions { width:100%; justify-content:space-between; }
      .btn { padding:8px 10px; font-size:12px; }
      #terminalWrap { inset:90px 0 0 0; padding:4px; }
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="server-info">
      <div id="serverName" class="server-name">正在准备终端...</div>
      <div id="serverDetails" class="server-details"></div>
    </div>
    <div class="actions">
      <span id="connectionStatus" class="chip connecting">连接中</span>
      <button class="btn" id="reconnectBtn" onclick="reconnect()" style="display:none;">重连</button>
      <button class="btn" onclick="history.back()">返回</button>
    </div>
  </div>
  <div id="terminalWrap"><div id="terminal"></div></div>
  <div id="loadingOverlay" class="overlay">正在连接 SSH 服务器...</div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/addonFit.js"></script>
  <script>
    const authToken = localStorage.getItem('webssh_token');
    const urlParams = new URLSearchParams(location.search);
    const serverId = urlParams.get('server');
    const serverNameEl = document.getElementById('serverName');
    const serverDetailsEl = document.getElementById('serverDetails');
    const statusEl = document.getElementById('connectionStatus');
    const reconnectBtn = document.getElementById('reconnectBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    let ws = null;
    let currentServer = null;

    const term = new Terminal({
      theme: {
        background: '#000000', foreground: '#d1fae5', cursor: '#10b981', cursorAccent: '#000000', selection: '#ffffff30'
      },
      fontSize: 14,
      fontFamily: 'Menlo, Monaco, Consolas, monospace',
      cursorBlink: true,
      convertEol: false,
      scrollback: 5000
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    window.addEventListener('resize', () => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });

    function showLoading(text = '正在连接 SSH 服务器...') { loadingOverlay.textContent = text; loadingOverlay.style.display = 'flex'; }
    function hideLoading() { loadingOverlay.style.display = 'none'; }
    function updateStatus(state, text) {
      statusEl.className = `chip ${state}`;
      statusEl.textContent = text;
    }

    async function authFetch(url, options = {}) {
      if (!authToken) {
        alert('登录已失效，请重新登录');
        location.href = '/login.html';
        throw new Error('未登录');
      }
      const res = await fetch(url, { ...options, headers: { ...(options.headers || {}), Authorization: `Bearer ${authToken}` } });
      if (res.status === 401) {
        localStorage.removeItem('webssh_token');
        alert('登录已失效，请重新登录');
        location.href = '/login.html';
        throw new Error('未授权');
      }
      return res;
    }

    async function getServerInfo() {
      if (!serverId) {
        term.write('错误：未指定服务器ID\r\n');
        updateStatus('disconnected', '参数错误');
        hideLoading();
        return;
      }
      try {
        const response = await authFetch('/api/servers');
        const servers = await response.json();
        currentServer = servers.find(s => String(s.id) === String(serverId));
        if (!currentServer) {
          term.write('错误：服务器不存在\r\n');
          updateStatus('disconnected', '服务器不存在');
          hideLoading();
          return;
        }
        serverNameEl.textContent = currentServer.name;
        serverDetailsEl.textContent = `${currentServer.username}@${currentServer.host}:${currentServer.port || 22}`;
        connectWebSocket();
      } catch (error) {
        term.write(`获取服务器信息失败: ${error.message}\r\n`);
        updateStatus('disconnected', '加载失败');
        hideLoading();
      }
    }

    function connectWebSocket() {
      updateStatus('connecting', '连接中');
      showLoading('正在建立 WebSocket 与 SSH 连接...');
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        console.log('WebSocket opened');
        reconnectBtn.style.display = 'none';
        const connectMsg = {
          type: 'connect',
          token: authToken,
          serverId: parseInt(currentServer.id, 10),
          cols: term.cols,
          rows: term.rows
        };
        console.log('Sending message:', connectMsg);
        ws.send(JSON.stringify(connectMsg));
        term.focus();
        term.write('\r\n*** WebSocket已连接，正在建立SSH连接...\r\n');
      };

      ws.onmessage = (event) => {
        console.log('WebSocket message:', event.data);
        let message;
        try { message = JSON.parse(event.data); } catch { term.write(event.data); return; }
        console.log('Parsed message:', message);
        switch (message.type) {
          case 'connected':
            updateStatus('connected', '已连接');
            hideLoading();
            term.write(`\r\n*** ${message.message} ***\r\n`);
            break;
          case 'data':
            term.write(message.data || '');
            break;
          case 'error':
            updateStatus('disconnected', '连接错误');
            reconnectBtn.style.display = 'inline-block';
            hideLoading();
            term.write(`\r\n*** 错误: ${message.message} ***\r\n`);
            break;
          case 'close':
            updateStatus('disconnected', '已断开');
            reconnectBtn.style.display = 'inline-block';
            hideLoading();
            term.write(`\r\n*** ${message.message} ***\r\n`);
            break;
        }
      };

      ws.onclose = (event) => {
        console.log('WebSocket closed:', event.code, event.reason);
        updateStatus('disconnected', '已断开');
        reconnectBtn.style.display = 'inline-block';
        hideLoading();
        term.write(`\r\n*** WebSocket连接已关闭 (code: ${event.code}, reason: ${event.reason}) ***\r\n`);
      };

      ws.onerror = (error) => {
        console.log('WebSocket error:', error);
        updateStatus('disconnected', '连接错误');
        reconnectBtn.style.display = 'inline-block';
        hideLoading();
        term.write('\r\n*** WebSocket连接错误 ***\r\n');
        term.write('\r\n*** 详细错误信息请查看浏览器控制台 (F12) ***\r\n');
      };
    }

    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    function reconnect() {
      if (ws) try { ws.close(); } catch (_) {}
      term.write('\r\n*** 正在重连... ***\r\n');
      connectWebSocket();
    }

    showLoading();
    getServerInfo();
  </script>
</body>
</html>
